<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signature Text Widget</title>
  <script src="https://js.jotform.com/JFCustomWidget.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      padding: 8px 4px 4px;
    }

    /* ── Signature display area ───────────────────── */
    .sig-wrapper {
      position: relative;
      width: 100%;
      min-height: 72px;
      border-bottom: 2px solid #aaa;
      cursor: text;
      padding-bottom: 4px;
    }

    .sig-wrapper::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 1px;
      background: repeating-linear-gradient(
        90deg,
        #ccc 0,
        #ccc 4px,
        transparent 4px,
        transparent 8px
      );
    }

    .sig-wrapper.focused {
      border-bottom-color: #1a3a8b;
    }

    /* Hidden real input for keyboard / accessibility */
    .real-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      border: none;
      outline: none;
      pointer-events: none;
    }

    /* The rendered signature text */
    .sig-display {
      min-height: 64px;
      width: 100%;
      padding: 4px 2px 0;
      font-family: 'Dancing Script', cursive;
      font-size: 42px;
      line-height: 1.1;
      word-break: break-word;
      letter-spacing: 2px;
    }

    /* Placeholder */
    .sig-placeholder {
      position: absolute;
      top: 8px;
      left: 2px;
      font-size: 16px;
      color: #bbb;
      font-family: sans-serif;
      pointer-events: none;
      transition: opacity 0.2s;
      font-style: italic;
    }

    /* Blinking cursor */
    .sig-cursor {
      display: inline-block;
      width: 2px;
      height: 0.85em;
      background: #1a3a8b;
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Each rendered character */
    .sig-char {
      display: inline-block;
      transition: transform 0.08s ease-out;
    }

    /* Ink-drop animation for newly typed char */
    @keyframes inkDrop {
      0%   { transform: scale(1.4) var(--wobble); opacity: 0.6; }
      100% { transform: scale(1)   var(--wobble); opacity: 1;   }
    }

    .sig-char.new {
      animation: inkDrop 0.18s ease-out forwards;
    }

    /* Clear button */
    .clear-btn {
      display: block;
      margin-top: 6px;
      margin-left: auto;
      font-size: 11px;
      color: #999;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .clear-btn:hover { color: #e55; background: #fff0f0; }
  </style>
</head>
<body>

<!-- Signature field -->
<div class="sig-wrapper" id="sigWrapper">
  <input class="real-input" id="realInput" type="text" autocomplete="off" spellcheck="false" />
  <div class="sig-placeholder" id="placeholder">Type your signature…</div>
  <div class="sig-display" id="sigDisplay"></div>
</div>

<button class="clear-btn" id="clearBtn">✕ Clear</button>

<script>
  var COLOR = '#1a3a8b';
  var state = { text: '' };

  var wrapper   = document.getElementById('sigWrapper');
  var realInput = document.getElementById('realInput');
  var display   = document.getElementById('sigDisplay');
  var placeholder = document.getElementById('placeholder');
  var clearBtn  = document.getElementById('clearBtn');

  function wobbleFor(idx) {
    var angles = [1.2, -0.8, 2.1, -1.5, 0.4, -2.0, 1.7, -0.3, 2.4, -1.1];
    var ys     = [0, -1, 1, -2, 0, 1, -1, 2, 0, -1];
    return { rotate: angles[idx % angles.length], ty: ys[idx % ys.length] };
  }

  function render(newCharIdx) {
    display.innerHTML = '';
    for (var i = 0; i < state.text.length; i++) {
      var span = document.createElement('span');
      span.className = 'sig-char' + (i === newCharIdx ? ' new' : '');
      span.textContent = state.text[i];
      var w = wobbleFor(i);
      var wobble = 'rotate(' + w.rotate + 'deg) translateY(' + w.ty + 'px)';
      span.style.cssText = 'transform:' + wobble + '; color:' + COLOR + '; --wobble:' + wobble;
      display.appendChild(span);
    }
    var cursor = document.createElement('span');
    cursor.className = 'sig-cursor';
    display.appendChild(cursor);
    placeholder.style.opacity = state.text.length ? '0' : '1';
  }

  // ── DOM event listeners — always active, independent of JotForm ──
  realInput.addEventListener('input', function () {
    var prev = state.text;
    state.text = realInput.value;
    var newIdx = state.text.length > prev.length ? state.text.length - 1 : -1;
    render(newIdx);
  });

  realInput.addEventListener('focus', function () { wrapper.classList.add('focused'); });
  realInput.addEventListener('blur',  function () { wrapper.classList.remove('focused'); });
  wrapper.addEventListener('click',   function () { realInput.focus(); });

  clearBtn.addEventListener('click', function () {
    state.text = '';
    realInput.value = '';
    render(-1);
    realInput.focus();
  });

  render(-1);

  // ── JotForm integration — separate, top-level ──
  JFCustomWidget.subscribe('ready', function () {
    var existing = JFCustomWidget.getWidgetSetting('defaultValue');
    if (existing) {
      state.text = existing;
      realInput.value = existing;
      render(-1);
    }
    JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 8 });
  });

  JFCustomWidget.subscribe('submit', function () {
    JFCustomWidget.sendSubmit({ value: state.text, valid: true });
  });
</script>
</body>
</html>
